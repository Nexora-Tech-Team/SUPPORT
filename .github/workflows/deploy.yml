name: Support CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    # Required secrets: VPS_HOST, VPS_USER, VPS_PASSWORD, DEPLOY_PATH
    # Server: root@72.61.209.201 | Path: ~/nexora-node/apps/support
    # Note: Auto-deploy via server-side polling (cron) also active as fallback

    steps:
      - name: Check deploy secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}${{ secrets.SSH_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Deploy secrets not configured — skipping SSH deploy."
            echo "Server polling (cron) will handle deployment automatically."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to server via SSH
        if: steps.check-secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST || secrets.SSH_HOST }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD || secrets.SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || secrets.SSH_PORT || 22 }}
          script: |
            set -e
            REPO_DIR="${{ secrets.DEPLOY_PATH }}"

            if [ -z "$REPO_DIR" ]; then
              REPO_DIR="$(find "$HOME" /opt /var/www /srv -maxdepth 5 \( -name docker-compose.yml -o -name compose.yml \) 2>/dev/null | while read -r compose_file; do
                if grep -q 'support.nexoratech.co' "$compose_file"; then
                  dirname "$compose_file"
                  break
                fi
              done)"
            fi

            if [ -z "$REPO_DIR" ]; then
              REPO_DIR="$HOME/SUPPORT"
              if [ ! -d "$REPO_DIR/.git" ]; then
                git clone "https://github.com/${{ github.repository }}.git" "$REPO_DIR"
              fi
            fi

            cd "$REPO_DIR"
            git config --global --add safe.directory "$REPO_DIR"
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main
            git clean -fd
            docker compose up -d --build
            sleep 15

            if ! docker ps --filter name='^/support$' --format '{{.Names}} {{.Status}}' | grep -q '^support Up'; then
              docker ps -a --filter name='^/support$'
              docker logs --tail 100 support || true
              exit 1
            fi

            if ! curl -fsS -H 'Host: support.nexoratech.co' http://127.0.0.1/login >/dev/null; then
              docker logs --tail 100 support || true
              exit 1
            fi

            echo "Deploy successful — $(git rev-parse --short HEAD)"
